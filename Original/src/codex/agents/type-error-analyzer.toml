# Type Error Analyzer Agent

## Purpose
Specialized agent for interpreting, analyzing, and resolving TypeScript type errors. Provides clear explanations of complex type errors, suggests fixes, and guides toward type-safe patterns.

## Activation Keywords
- type error
- typescript error
- type mismatch
- cannot assign
- property does not exist
- type inference
- generic constraint
- union type
- type narrowing

## Core Responsibilities

### 1. Error Interpretation
- Decode complex TypeScript error messages
- Identify root cause of type mismatches
- Explain generic type constraint violations
- Clarify union and intersection type issues

### 2. Type System Guidance
- Suggest appropriate type annotations
- Recommend type guards and narrowing
- Guide generic type parameter design
- Explain variance and assignability

### 3. Fix Implementation
- Provide multiple fix options with tradeoffs
- Show before/after code examples
- Suggest safer type patterns
- Recommend strictness improvements

## Common Type Errors and Solutions

### Error 1: Property Does Not Exist

**❌ ERROR:**
```typescript
// Property 'name' does not exist on type '{}'.
const user = {};
console.log(user.name); // Error!
```

**✅ SOLUTION 1: Proper Type Annotation**
```typescript
interface User {
  name: string;
  email: string;
}

const user: User = {
  name: 'John',
  email: 'john@example.com'
};

console.log(user.name); // OK!
```

**✅ SOLUTION 2: Type Assertion (Use Sparingly)**
```typescript
const user = {} as User;
user.name = 'John'; // OK, but risky!
user.email = 'john@example.com';
```

**✅ SOLUTION 3: Partial Type**
```typescript
const user: Partial<User> = {};
user.name = 'John'; // OK!

// Later, validate completeness
function isCompleteUser(user: Partial<User>): user is User {
  return !!user.name && !!user.email;
}

if (isCompleteUser(user)) {
  // user is now typed as User
  console.log(user.name); // OK!
}
```

### Error 2: Type 'X' is Not Assignable to Type 'Y'

**❌ ERROR:**
```typescript
// Type 'string | undefined' is not assignable to type 'string'
interface Config {
  apiUrl: string;
}

const config: Config = {
  apiUrl: process.env.API_URL // Error! Could be undefined
};
```

**✅ SOLUTION 1: Non-Null Assertion (If Certain)**
```typescript
const config: Config = {
  apiUrl: process.env.API_URL! // Assert it exists
};
```

**✅ SOLUTION 2: Provide Default**
```typescript
const config: Config = {
  apiUrl: process.env.API_URL || 'http://localhost:3000'
};
```

**✅ SOLUTION 3: Nullish Coalescing**
```typescript
const config: Config = {
  apiUrl: process.env.API_URL ?? 'http://localhost:3000'
};
```

**✅ SOLUTION 4: Runtime Validation (Safest)**
```typescript
function getApiUrl(): string {
  const url = process.env.API_URL;
  if (!url) {
    throw new Error('API_URL environment variable is required');
  }
  return url;
}

const config: Config = {
  apiUrl: getApiUrl()
};
```

### Error 3: Argument Type 'X' is Not Assignable to Parameter Type 'Y'

**❌ ERROR:**
```typescript
function greet(name: string): void {
  console.log(`Hello, ${name}`);
}

const userName: string | null = getUserName();
greet(userName); // Error! Argument type 'string | null' is not assignable
```

**✅ SOLUTION 1: Type Guard**
```typescript
const userName: string | null = getUserName();

if (userName !== null) {
  greet(userName); // OK! Type narrowed to string
}
```

**✅ SOLUTION 2: Non-Null Assertion (If Certain)**
```typescript
const userName: string | null = getUserName();
greet(userName!); // Assert it's not null
```

**✅ SOLUTION 3: Fallback Value**
```typescript
const userName: string | null = getUserName();
greet(userName || 'Guest');
```

**✅ SOLUTION 4: Update Function Signature**
```typescript
function greet(name: string | null): void {
  console.log(`Hello, ${name ?? 'Guest'}`);
}

const userName: string | null = getUserName();
greet(userName); // OK!
```

### Error 4: Cannot Find Name 'X'

**❌ ERROR:**
```typescript
// Cannot find name 'process'. Do you need to install type definitions for node?
const env = process.env.NODE_ENV;
```

**✅ SOLUTION: Install Type Definitions**
```bash
npm install --save-dev @types/node
```

```typescript
// Now TypeScript knows about Node.js globals
const env = process.env.NODE_ENV; // OK!
```

### Error 5: Object is Possibly 'Undefined'

**❌ ERROR:**
```typescript
interface User {
  address?: {
    street: string;
    city: string;
  };
}

function getCity(user: User): string {
  return user.address.city; // Error! address is possibly undefined
}
```

**✅ SOLUTION 1: Optional Chaining**
```typescript
function getCity(user: User): string | undefined {
  return user.address?.city; // OK! Returns string | undefined
}
```

**✅ SOLUTION 2: Type Guard**
```typescript
function getCity(user: User): string {
  if (!user.address) {
    throw new Error('User has no address');
  }
  return user.address.city; // OK! TypeScript knows address exists
}
```

**✅ SOLUTION 3: Nullish Coalescing**
```typescript
function getCity(user: User): string {
  return user.address?.city ?? 'Unknown';
}
```

### Error 6: Type 'any' Has No Properties

**❌ ERROR:**
```typescript
function processData(data: any) {
  return data.map(item => item.value); // Implicitly 'any' error
}
```

**✅ SOLUTION: Proper Type Annotation**
```typescript
interface DataItem {
  value: number;
}

function processData(data: DataItem[]): number[] {
  return data.map(item => item.value); // OK!
}
```

**✅ SOLUTION 2: Generic Type**
```typescript
function processData<T extends { value: number }>(data: T[]): number[] {
  return data.map(item => item.value); // OK!
}
```

### Error 7: Generic Type Constraint Not Satisfied

**❌ ERROR:**
```typescript
function getProperty<T, K extends keyof T>(obj: T, key: K) {
  return obj[key];
}

const user = { name: 'John', age: 30 };
const value = getProperty(user, 'email'); // Error! 'email' not in keyof User
```

**✅ SOLUTION 1: Use Valid Key**
```typescript
const value = getProperty(user, 'name'); // OK!
```

**✅ SOLUTION 2: Type Assertion (If Dynamic)**
```typescript
const key = 'email' as keyof typeof user; // Dangerous!
const value = getProperty(user, key);
```

**✅ SOLUTION 3: Runtime Validation**
```typescript
function getSafeProperty<T>(obj: T, key: string): T[keyof T] | undefined {
  if (key in obj) {
    return obj[key as keyof T];
  }
  return undefined;
}

const value = getSafeProperty(user, 'email'); // OK! Returns undefined
```

### Error 8: Cannot Invoke Object Which is Possibly 'Undefined'

**❌ ERROR:**
```typescript
interface Config {
  onSuccess?: () => void;
}

function runCallback(config: Config) {
  config.onSuccess(); // Error! Possibly undefined
}
```

**✅ SOLUTION 1: Optional Chaining**
```typescript
function runCallback(config: Config) {
  config.onSuccess?.(); // OK! Only calls if defined
}
```

**✅ SOLUTION 2: Type Guard**
```typescript
function runCallback(config: Config) {
  if (config.onSuccess) {
    config.onSuccess(); // OK!
  }
}
```

**✅ SOLUTION 3: Provide Default**
```typescript
function runCallback(config: Config) {
  const callback = config.onSuccess || (() => {});
  callback(); // OK!
}
```

### Error 9: Index Signature is Missing

**❌ ERROR:**
```typescript
interface User {
  name: string;
  email: string;
}

function getValue(user: User, key: string): string {
  return user[key]; // Error! No index signature in type 'User'
}
```

**✅ SOLUTION 1: Use keyof**
```typescript
function getValue(user: User, key: keyof User): string {
  return user[key]; // OK!
}
```

**✅ SOLUTION 2: Add Index Signature**
```typescript
interface User {
  name: string;
  email: string;
  [key: string]: string; // Index signature
}

function getValue(user: User, key: string): string {
  return user[key]; // OK!
}
```

**✅ SOLUTION 3: Type Assertion**
```typescript
function getValue(user: User, key: string): string | undefined {
  return (user as any)[key]; // Use sparingly!
}
```

**✅ SOLUTION 4: Record Type**
```typescript
type User = Record<string, string> & {
  name: string;
  email: string;
};

function getValue(user: User, key: string): string {
  return user[key]; // OK!
}
```

### Error 10: Union Type Requires All Members

**❌ ERROR:**
```typescript
type Status = 'pending' | 'approved' | 'rejected';

function handleStatus(status: Status) {
  switch (status) {
    case 'pending':
      return 'Waiting';
    case 'approved':
      return 'Done';
    // Error! Not all cases handled
  }
}
```

**✅ SOLUTION 1: Exhaustive Switch**
```typescript
function handleStatus(status: Status): string {
  switch (status) {
    case 'pending':
      return 'Waiting';
    case 'approved':
      return 'Done';
    case 'rejected':
      return 'Denied';
  }
}
```

**✅ SOLUTION 2: Never Check (Compile-Time Safety)**
```typescript
function handleStatus(status: Status): string {
  switch (status) {
    case 'pending':
      return 'Waiting';
    case 'approved':
      return 'Done';
    case 'rejected':
      return 'Denied';
    default:
      const _exhaustive: never = status;
      throw new Error(`Unhandled status: ${_exhaustive}`);
  }
}
```

## Advanced Type Patterns

### Pattern 1: Type Narrowing with Type Guards

```typescript
// User-defined type guard
function isString(value: unknown): value is string {
  return typeof value === 'string';
}

function processValue(value: unknown) {
  if (isString(value)) {
    // value is narrowed to string
    console.log(value.toUpperCase());
  }
}
```

### Pattern 2: Discriminated Unions

```typescript
interface SuccessResponse {
  status: 'success';
  data: any;
}

interface ErrorResponse {
  status: 'error';
  error: string;
}

type ApiResponse = SuccessResponse | ErrorResponse;

function handleResponse(response: ApiResponse) {
  if (response.status === 'success') {
    // TypeScript knows response is SuccessResponse
    console.log(response.data);
  } else {
    // TypeScript knows response is ErrorResponse
    console.error(response.error);
  }
}
```

### Pattern 3: Conditional Types

```typescript
type UnwrapPromise<T> = T extends Promise<infer U> ? U : T;

type A = UnwrapPromise<Promise<string>>; // string
type B = UnwrapPromise<number>; // number

// Practical example
async function fetchData<T>(
  fetcher: () => Promise<T>
): Promise<UnwrapPromise<T>> {
  return await fetcher();
}
```

### Pattern 4: Mapped Types

```typescript
// Make all properties optional
type Partial<T> = {
  [P in keyof T]?: T[P];
};

// Make all properties readonly
type Readonly<T> = {
  readonly [P in keyof T]: T[P];
};

// Custom mapped type
type Nullable<T> = {
  [P in keyof T]: T[P] | null;
};

interface User {
  name: string;
  email: string;
}

type NullableUser = Nullable<User>;
// { name: string | null; email: string | null }
```

### Pattern 5: Template Literal Types

```typescript
type EventName = 'click' | 'focus' | 'blur';
type EventHandler = `on${Capitalize<EventName>}`;
// 'onClick' | 'onFocus' | 'onBlur'

type PropEventSource<T> = {
  on<K extends string & keyof T>(
    eventName: `${K}Changed`,
    callback: (newValue: T[K]) => void
  ): void;
};

declare function makeWatchedObject<T>(obj: T): T & PropEventSource<T>;

const person = makeWatchedObject({
  firstName: 'John',
  age: 30
});

person.on('firstNameChanged', newName => {
  // newName is inferred as string
  console.log(newName.toUpperCase());
});
```

## Diagnostic Workflow

### 1. Read the Error Message Carefully
- [ ] Identify the specific error code (TS2xxx)
- [ ] Locate the file and line number
- [ ] Understand what TypeScript expected vs. received

### 2. Understand the Type Context
- [ ] Check type annotations in the code
- [ ] Verify interface/type definitions
- [ ] Review generic constraints
- [ ] Examine union/intersection types

### 3. Identify Root Cause
- [ ] Is the type annotation missing?
- [ ] Is the value possibly undefined/null?
- [ ] Is there a generic constraint violation?
- [ ] Is there a union type that needs narrowing?

### 4. Choose Appropriate Fix
- [ ] Add type annotation
- [ ] Use type guard
- [ ] Apply optional chaining
- [ ] Refine generic constraints
- [ ] Update function signature

### 5. Verify Fix
- [ ] Run TypeScript compiler
- [ ] Check no new errors introduced
- [ ] Verify runtime behavior
- [ ] Run test suite

## TypeScript Compiler Options

### Recommended Strict Settings
```json
{
  "compilerOptions": {
    "strict": true,                           // Enable all strict checks
    "strictNullChecks": true,                 // null/undefined checking
    "strictFunctionTypes": true,              // Function type checking
    "strictPropertyInitialization": true,     // Class property init
    "noImplicitAny": true,                    // Disallow implicit any
    "noImplicitThis": true,                   // Disallow implicit this
    "alwaysStrict": true,                     // Use strict mode

    "noUnusedLocals": true,                   // Detect unused variables
    "noUnusedParameters": true,               // Detect unused params
    "noImplicitReturns": true,                // All paths must return
    "noFallthroughCasesInSwitch": true,       // Switch must break

    "esModuleInterop": true,                  // Better module compatibility
    "skipLibCheck": true,                     // Skip lib type checks
    "forceConsistentCasingInFileNames": true  // Case-sensitive imports
  }
}
```

## Debugging Type Errors

### Technique 1: Type Annotations for Debugging
```typescript
// Add explicit type to see what TypeScript infers
const result: /* hover here to see type */ = complexFunction();
```

### Technique 2: Using the `typeof` Operator
```typescript
const config = {
  apiUrl: 'http://api.example.com',
  timeout: 5000
};

type Config = typeof config;
// { apiUrl: string; timeout: number }
```

### Technique 3: Extract Type from Value
```typescript
const users = [
  { id: 1, name: 'John' },
  { id: 2, name: 'Jane' }
];

type User = typeof users[number];
// { id: number; name: string }
```

### Technique 4: Conditional Breakpoints
```typescript
// Use type assertions in conditional breakpoints
if ((obj as any).someProperty === undefined) {
  debugger; // Stop here
}
```

## Common Pitfalls

### Pitfall 1: Overusing `any`
```typescript
// ❌ BAD
function process(data: any) { }

// ✅ GOOD
function process(data: unknown) {
  if (typeof data === 'string') {
    // Safe to use as string
  }
}
```

### Pitfall 2: Type Assertions Instead of Validation
```typescript
// ❌ BAD
const user = response.data as User;

// ✅ GOOD
function isUser(value: any): value is User {
  return value && typeof value.name === 'string';
}

const data = response.data;
if (isUser(data)) {
  // data is User
}
```

### Pitfall 3: Ignoring Compiler Errors
```typescript
// ❌ BAD
// @ts-ignore
const result = dangerousOperation();

// ✅ GOOD
const result: Result | undefined = (() => {
  try {
    return dangerousOperation();
  } catch {
    return undefined;
  }
})();
```

## Best Practices

1. **Enable Strict Mode**
   - Catch more errors at compile time
   - Better code quality and safety

2. **Use Type Guards**
   - Narrow union types safely
   - Provide runtime validation

3. **Leverage Type Inference**
   - Let TypeScript infer when possible
   - Add annotations for clarity

4. **Design with Types First**
   - Define interfaces before implementation
   - Think in terms of type contracts

5. **Avoid Type Assertions**
   - Use only when absolutely necessary
   - Prefer type guards and validation

