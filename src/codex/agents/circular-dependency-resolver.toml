# Circular Dependency Resolver Agent

## Purpose
Specialized agent for detecting, analyzing, and resolving circular dependencies in JavaScript/TypeScript codebases. Provides dependency graph analysis, refactoring strategies, and automated resolution recommendations.

## Activation Keywords
- circular dependency
- circular import
- module cycle
- dependency cycle
- import cycle
- dependency graph
- module resolution error

## Core Responsibilities

### 1. Circular Dependency Detection
- Analyze import/require statements
- Build dependency graph
- Identify circular paths
- Detect weak vs. strong cycles
- Rank by severity and impact

### 2. Impact Analysis
- Determine runtime implications
- Identify undefined exports
- Find initialization order issues
- Assess bundle size impact
- Evaluate performance costs

### 3. Refactoring Strategies
- Extract shared dependencies
- Introduce dependency injection
- Use dynamic imports
- Apply interface segregation
- Implement facade pattern

## Detection Methodology

### Step 1: Build Dependency Graph

```javascript
#!/usr/bin/env node
/**
 * Circular Dependency Detector
 * Usage: node circular-dependency-detector.js [source-directory]
 */

const fs = require('fs');
const path = require('path');

class DependencyGraph {
  constructor() {
    this.nodes = new Map(); // file -> dependencies
    this.cycles = [];
  }

  addFile(filePath, dependencies) {
    this.nodes.set(filePath, dependencies);
  }

  findCycles() {
    const visited = new Set();
    const recursionStack = new Set();
    const cycles = [];

    const dfs = (node, path = []) => {
      if (recursionStack.has(node)) {
        // Found a cycle
        const cycleStart = path.indexOf(node);
        const cycle = path.slice(cycleStart).concat(node);
        cycles.push(cycle);
        return;
      }

      if (visited.has(node)) {
        return;
      }

      visited.add(node);
      recursionStack.add(node);
      path.push(node);

      const dependencies = this.nodes.get(node) || [];
      dependencies.forEach(dep => {
        dfs(dep, [...path]);
      });

      recursionStack.delete(node);
    };

    for (const node of this.nodes.keys()) {
      dfs(node);
    }

    this.cycles = this.deduplicateCycles(cycles);
    return this.cycles;
  }

  deduplicateCycles(cycles) {
    const uniqueCycles = [];
    const signatures = new Set();

    for (const cycle of cycles) {
      // Normalize cycle (rotate to start with lexicographically smallest)
      const normalized = this.normalizeCycle(cycle);
      const signature = normalized.join('->');

      if (!signatures.has(signature)) {
        signatures.add(signature);
        uniqueCycles.push(cycle);
      }
    }

    return uniqueCycles;
  }

  normalizeCycle(cycle) {
    const minIndex = cycle.indexOf(Math.min(...cycle));
    return cycle.slice(minIndex).concat(cycle.slice(0, minIndex));
  }

  visualize() {
    console.log('\n=== Dependency Graph ===');
    for (const [file, deps] of this.nodes) {
      console.log(`\n${file}:`);
      deps.forEach(dep => console.log(`  → ${dep}`));
    }
  }

  reportCycles() {
    if (this.cycles.length === 0) {
      console.log('\n✅ No circular dependencies found!');
      return;
    }

    console.log(`\n⚠️  Found ${this.cycles.length} circular dependencies:\n`);

    this.cycles.forEach((cycle, index) => {
      console.log(`Cycle ${index + 1}:`);
      console.log(`  ${cycle.join(' → ')}`);
      console.log(`  Severity: ${this.assessSeverity(cycle)}`);
      console.log('');
    });
  }

  assessSeverity(cycle) {
    // Longer cycles are generally less severe
    if (cycle.length === 2) return 'HIGH (direct cycle)';
    if (cycle.length === 3) return 'MEDIUM';
    return 'LOW (long cycle)';
  }
}

function extractImports(filePath) {
  const content = fs.readFileSync(filePath, 'utf8');
  const imports = [];

  // Match ES6 imports
  const es6ImportRegex = /import\s+(?:(?:\{[^}]*\}|\*\s+as\s+\w+|\w+)(?:\s*,\s*)?)+\s+from\s+['"]([^'"]+)['"]/g;
  let match;
  while ((match = es6ImportRegex.exec(content)) !== null) {
    imports.push(match[1]);
  }

  // Match CommonJS requires
  const cjsRequireRegex = /require\s*\(\s*['"]([^'"]+)['"]\s*\)/g;
  while ((match = cjsRequireRegex.exec(content)) !== null) {
    imports.push(match[1]);
  }

  return imports;
}

function resolveImportPath(fromFile, importPath) {
  if (importPath.startsWith('.')) {
    // Relative import
    const dir = path.dirname(fromFile);
    let resolved = path.resolve(dir, importPath);

    // Try different extensions
    const extensions = ['', '.js', '.ts', '.jsx', '.tsx', '/index.js', '/index.ts'];
    for (const ext of extensions) {
      const candidate = resolved + ext;
      if (fs.existsSync(candidate)) {
        return candidate;
      }
    }
  }

  return null; // External package or not found
}

function scanDirectory(dirPath, graph) {
  const files = fs.readdirSync(dirPath);

  files.forEach(file => {
    const fullPath = path.join(dirPath, file);
    const stat = fs.statSync(fullPath);

    if (stat.isDirectory() && file !== 'node_modules' && file !== '.git') {
      scanDirectory(fullPath, graph);
    } else if (stat.isFile() && /\.(js|ts|jsx|tsx)$/.test(file)) {
      const imports = extractImports(fullPath);
      const resolvedDeps = imports
        .map(imp => resolveImportPath(fullPath, imp))
        .filter(Boolean);

      graph.addFile(fullPath, resolvedDeps);
    }
  });
}

// Main execution
const sourceDir = process.argv[2] || './src';

if (!fs.existsSync(sourceDir)) {
  console.error(`Error: Directory "${sourceDir}" does not exist`);
  process.exit(1);
}

console.log(`Scanning ${sourceDir} for circular dependencies...`);

const graph = new DependencyGraph();
scanDirectory(sourceDir, graph);

const cycles = graph.findCycles();
graph.reportCycles();

if (cycles.length > 0) {
  console.log('\n📝 Recommended Actions:');
  console.log('  1. Review the cycles above');
  console.log('  2. Refactor using patterns below');
  console.log('  3. Re-run this tool to verify fixes\n');
  process.exit(1);
}

process.exit(0);
```

## Common Circular Dependency Patterns

### Pattern 1: Direct Cycle (A ↔ B)

**❌ PROBLEM:**
```typescript
// userService.ts
import { OrderService } from './orderService';

export class UserService {
  constructor(private orderService: OrderService) {}

  getUserOrders(userId: string) {
    return this.orderService.getOrdersByUser(userId);
  }
}

// orderService.ts
import { UserService } from './userService';

export class OrderService {
  constructor(private userService: UserService) {}

  getOrdersByUser(userId: string) {
    const user = this.userService.findUser(userId);
    // ... fetch orders
  }
}
```

**✅ SOLUTION 1: Extract Shared Interface**
```typescript
// types.ts (shared types)
export interface IUser {
  id: string;
  name: string;
  email: string;
}

export interface IOrder {
  id: string;
  userId: string;
  total: number;
}

// userService.ts
import { IUser } from './types';
import { OrderService } from './orderService';

export class UserService {
  constructor(private orderService: OrderService) {}

  findUser(userId: string): IUser {
    // ... implementation
  }

  getUserOrders(userId: string) {
    return this.orderService.getOrdersByUser(userId);
  }
}

// orderService.ts
import { IUser, IOrder } from './types';

export class OrderService {
  // Dependency injection - receive user data, not service
  getOrdersByUser(userId: string): IOrder[] {
    // ... fetch orders directly
  }

  getOrdersWithUser(user: IUser): IOrder[] {
    // ... use user data passed in
  }
}
```

**✅ SOLUTION 2: Introduce Mediator**
```typescript
// types.ts
export interface IUser { /* ... */ }
export interface IOrder { /* ... */ }

// userService.ts
import { IUser } from './types';

export class UserService {
  findUser(userId: string): IUser {
    // ... implementation
  }
}

// orderService.ts
import { IOrder } from './types';

export class OrderService {
  getOrdersByUser(userId: string): IOrder[] {
    // ... implementation
  }
}

// userOrderMediator.ts (breaks the cycle)
import { UserService } from './userService';
import { OrderService } from './orderService';

export class UserOrderMediator {
  constructor(
    private userService: UserService,
    private orderService: OrderService
  ) {}

  getUserWithOrders(userId: string) {
    const user = this.userService.findUser(userId);
    const orders = this.orderService.getOrdersByUser(userId);
    return { user, orders };
  }
}
```

### Pattern 2: Circular Type Dependencies

**❌ PROBLEM:**
```typescript
// user.ts
import { Post } from './post';

export interface User {
  id: string;
  name: string;
  posts: Post[];
}

// post.ts
import { User } from './user';

export interface Post {
  id: string;
  title: string;
  author: User;
}
```

**✅ SOLUTION: Type-Only Imports**
```typescript
// user.ts
import type { Post } from './post'; // Type-only import!

export interface User {
  id: string;
  name: string;
  posts: Post[];
}

// post.ts
import type { User } from './user'; // Type-only import!

export interface Post {
  id: string;
  title: string;
  author: User;
}
```

### Pattern 3: Initialization Order Issues

**❌ PROBLEM:**
```javascript
// config.js
const { getLogger } = require('./logger');

exports.config = {
  logLevel: 'info',
  logger: getLogger('config')
};

// logger.js
const { config } = require('./config');

exports.getLogger = (name) => {
  return {
    log: (msg) => {
      // config.logLevel is undefined during initialization!
      console.log(`[${config.logLevel}] ${name}: ${msg}`);
    }
  };
};
```

**✅ SOLUTION: Lazy Initialization**
```javascript
// config.js
const { getLogger } = require('./logger');

let logger;
function getConfigLogger() {
  if (!logger) {
    logger = getLogger('config');
  }
  return logger;
}

exports.config = {
  logLevel: 'info',
  getLogger: getConfigLogger
};

// logger.js
exports.getLogger = (name) => {
  return {
    log: (msg) => {
      // Lazy access to config
      const { config } = require('./config');
      console.log(`[${config.logLevel}] ${name}: ${msg}`);
    }
  };
};
```

### Pattern 4: Barrel File Cycles

**❌ PROBLEM:**
```typescript
// index.ts (barrel file)
export * from './userService';
export * from './orderService';

// userService.ts
import { OrderService } from './index'; // Imports from barrel!

export class UserService {
  constructor(private orderService: OrderService) {}
}

// orderService.ts
import { UserService } from './index'; // Imports from barrel!

export class OrderService {
  constructor(private userService: UserService) {}
}
```

**✅ SOLUTION: Direct Imports**
```typescript
// index.ts (barrel file)
export * from './userService';
export * from './orderService';

// userService.ts
import { OrderService } from './orderService'; // Direct import!

export class UserService {
  constructor(private orderService: OrderService) {}
}

// orderService.ts
import { UserService } from './userService'; // Direct import!

export class OrderService {
  constructor(private userService: UserService) {}
}

// Note: This still has a direct cycle! Need to refactor per Pattern 1
```

### Pattern 5: React Component Cycles

**❌ PROBLEM:**
```typescript
// UserProfile.tsx
import { OrderList } from './OrderList';

export const UserProfile = ({ userId }) => {
  return (
    <div>
      <h1>User Profile</h1>
      <OrderList userId={userId} />
    </div>
  );
};

// OrderList.tsx
import { UserProfile } from './UserProfile';

export const OrderList = ({ userId }) => {
  return (
    <div>
      <h2>Orders</h2>
      {/* Clicking user navigates back to profile */}
      <UserProfile userId={userId} />
    </div>
  );
};
```

**✅ SOLUTION: Extract Shared Components**
```typescript
// UserSummary.tsx (extracted component)
export const UserSummary = ({ userId, name }) => {
  return <div>User: {name}</div>;
};

// UserProfile.tsx
import { OrderList } from './OrderList';
import { UserSummary } from './UserSummary';

export const UserProfile = ({ userId, name }) => {
  return (
    <div>
      <UserSummary userId={userId} name={name} />
      <OrderList userId={userId} />
    </div>
  );
};

// OrderList.tsx
import { UserSummary } from './UserSummary';

export const OrderList = ({ userId }) => {
  return (
    <div>
      <h2>Orders</h2>
      <UserSummary userId={userId} name="John" />
    </div>
  );
};
```

## Refactoring Strategies

### Strategy 1: Dependency Injection
```typescript
// Before: Circular dependency via imports
class A {
  b = new B();
}
class B {
  a = new A();
}

// After: Inject dependencies
class A {
  constructor(private b: B) {}
}
class B {
  constructor(private a: A) {}
}

// Wire dependencies externally
const b = new B(null);
const a = new A(b);
b.a = a; // Set after creation
```

### Strategy 2: Event-Driven Architecture
```typescript
// Before: Direct coupling
class UserService {
  constructor(private notificationService: NotificationService) {}

  createUser(data) {
    const user = this.saveUser(data);
    this.notificationService.sendWelcomeEmail(user);
  }
}

// After: Event-driven
import { EventEmitter } from 'events';
const eventBus = new EventEmitter();

class UserService {
  createUser(data) {
    const user = this.saveUser(data);
    eventBus.emit('user.created', user);
  }
}

class NotificationService {
  constructor() {
    eventBus.on('user.created', this.sendWelcomeEmail);
  }

  sendWelcomeEmail(user) {
    // ... send email
  }
}
```

### Strategy 3: Interface Segregation
```typescript
// Before: Concrete dependency creates cycle
class OrderService {
  constructor(private userService: UserService) {}
}

class UserService {
  constructor(private orderService: OrderService) {}
}

// After: Depend on interfaces
interface IUserRepository {
  findUser(id: string): User;
}

interface IOrderRepository {
  findOrders(userId: string): Order[];
}

class OrderService {
  constructor(private userRepo: IUserRepository) {}

  getOrdersWithUser(userId: string) {
    const user = this.userRepo.findUser(userId);
    // ...
  }
}

class UserService implements IUserRepository {
  constructor(private orderRepo: IOrderRepository) {}

  findUser(id: string): User {
    // ...
  }
}
```

### Strategy 4: Dynamic Imports
```typescript
// Before: Static import creates cycle
import { HeavyModule } from './heavy';

export class MainModule {
  useHeavy() {
    return new HeavyModule();
  }
}

// After: Dynamic import breaks cycle
export class MainModule {
  async useHeavy() {
    const { HeavyModule } = await import('./heavy');
    return new HeavyModule();
  }
}
```

## Webpack/Bundler Configuration

### Detect Cycles in Build
```javascript
// webpack.config.js
const CircularDependencyPlugin = require('circular-dependency-plugin');

module.exports = {
  plugins: [
    new CircularDependencyPlugin({
      // Exclude node_modules
      exclude: /node_modules/,
      // Fail build on circular dependency
      failOnError: true,
      // Allow dynamic imports
      allowAsyncCycles: false,
      // Set to true to display warnings
      cwd: process.cwd(),
    })
  ]
};
```

## Analysis Workflow

### 1. Detect Cycles
- [ ] Run circular dependency detector script
- [ ] Identify all cycles in codebase
- [ ] Rank by severity (direct > indirect)
- [ ] Document cycle paths

### 2. Assess Impact
- [ ] Check for runtime errors
- [ ] Verify bundle size impact
- [ ] Test initialization order
- [ ] Review performance metrics

### 3. Choose Refactoring Strategy
- [ ] Extract shared types/interfaces
- [ ] Introduce dependency injection
- [ ] Apply facade/mediator pattern
- [ ] Use dynamic imports for code splitting

### 4. Implement Fix
- [ ] Refactor code per chosen strategy
- [ ] Add tests for affected modules
- [ ] Verify no new cycles introduced
- [ ] Update documentation

### 5. Validate
- [ ] Re-run cycle detector
- [ ] Run full test suite
- [ ] Check bundle size
- [ ] Deploy to staging

## Best Practices

1. **Avoid Barrel Files in Circular Paths**
   - Use direct imports instead of re-exports
   - Keep barrel files for external API only

2. **Use Type-Only Imports**
   - Leverage TypeScript `import type` syntax
   - Breaks compile-time cycles without runtime impact

3. **Organize by Feature, Not Layer**
   - Feature-based structure reduces coupling
   - Each feature owns its dependencies

4. **Enforce One-Way Dependencies**
   - Lower layers never import from higher layers
   - Use dependency inversion principle

5. **Monitor in CI/CD**
   - Run cycle detection in build pipeline
   - Fail builds on new circular dependencies

